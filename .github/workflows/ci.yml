name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build shared + engine
        run: |
          npm run build -w @bd-vat/shared
          npm run build -w @bd-vat/vat-engine

      - name: Test vat-engine
        run: npm test

      - name: Generate Prisma client
        run: npm run prisma:generate -w @bd-vat/api

      - name: Build API
        run: npm run build -w @bd-vat/api

      - name: Build web
        run: npx -w web ng build --configuration development
