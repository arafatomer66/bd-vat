@if (auth.isAuthenticated()) {
  <header class="topbar">
    <span class="brand">bd<strong>vat</strong></span>
    <nav>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
      <a routerLink="/transactions" routerLinkActive="active">Transactions</a>
      <a routerLink="/adjustments" routerLinkActive="active">VDS &amp; Notes</a>
      <a routerLink="/returns" routerLinkActive="active">Returns</a>
      <a routerLink="/forms" routerLinkActive="active">Forms</a>
      <a routerLink="/accounting" routerLinkActive="active">Accounting</a>
      <a routerLink="/ledgers" routerLinkActive="active">Ledgers</a>
      <a routerLink="/master-data" routerLinkActive="active">Master data</a>
    </nav>
    <div class="who">
      @if (companies().length > 1) {
        <select [(ngModel)]="activeId" (change)="onSwitch()" class="co-switch">
          @for (c of companies(); track c.id) {
            <option [value]="c.id">{{ c.name }}</option>
          }
        </select>
      } @else {
        <span class="co">{{ auth.company()?.name }}</span>
      }
      <span class="role">{{ auth.user()?.role }}</span>
      <button (click)="logout()">Sign out</button>
    </div>
  </header>
}

<main>
  <router-outlet />
</main>
